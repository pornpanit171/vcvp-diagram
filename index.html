<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VC Issuance Sequence Diagram</title>

  <style>
    body {
      margin: 0;
      padding: 24px;
      font-family: Arial, sans-serif;
      background: #f7f7f7;
      color: #111;
    }

    h1 {
      margin-top: 0;
      font-size: 40px;
    }

    .toolbar {
      margin-bottom: 16px;
      font-size: 16px;
    }

    .toolbar a {
      margin-right: 16px;
    }

    .diagram-container {
      width: 100%;
      height: 80vh;
      overflow: auto;
      background: white;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 16px;
      box-sizing: border-box;
    }

    .diagram-container img {
      max-width: none;
      height: auto;
      display: block;
    }
  </style>
</head>

<body>
  <h1>VC Issuance Sequence Diagram</h1>

  <div class="toolbar">
    <span>View-only rendered diagram.</span>
    <a href="./docs/vc-issuance-sequence.puml" target="_blank">Source .puml</a>
    <a href="./docs/vc-issuance-sequence.svg" target="_blank">Open SVG</a>
  </div>

  <div class="diagram-container">
    <img
      src="./docs/vc-issuance-sequence.svg"
      alt="VC Issuance Sequence Diagram"
    />
  </div>
</body>
</html>
