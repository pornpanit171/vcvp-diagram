<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VC Sequence Diagrams</title>

  <style>
    body {
      margin: 0;
      padding: 24px;
      font-family: Arial, sans-serif;
      background: #f7f7f7;
      color: #111;
    }

    h1 {
      margin-top: 0;
      font-size: 40px;
    }

    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
    }

    .tab-button {
      border: 1px solid #ccc;
      background: white;
      padding: 10px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 15px;
    }

    .tab-button.active {
      background: #111;
      color: white;
      border-color: #111;
    }

    .diagram-container {
      width: 100%;
      height: 80vh;
      overflow: auto;
      background: white;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 16px;
      box-sizing: border-box;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      background: white;
    }
  </style>
</head>

<body>
  <h1>VC Sequence Diagrams</h1>

  <div class="tabs" id="tabs"></div>

  <div class="diagram-container">
    <iframe id="diagramFrame" title="Sequence Diagram"></iframe>
  </div>

  <script>
    const diagrams = [
      {
        title: "VC Issuance",
        svg: "./docs/vc-issuance-sequence.svg"
      }

      // เพิ่ม diagram ใหม่ตรงนี้ เช่น:
      // ,
      // {
      //   title: "VC Revocation",
      //   svg: "./docs/vc-revocation-sequence.svg"
      // },
      // {
      //   title: "VC Presentation",
      //   svg: "./docs/vc-presentation-sequence.svg"
      // }
    ];

    const tabs = document.getElementById("tabs");
    const diagramFrame = document.getElementById("diagramFrame");

    function showDiagram(index) {
      diagramFrame.src = diagrams[index].svg;

      document.querySelectorAll(".tab-button").forEach((button, buttonIndex) => {
        button.classList.toggle("active", buttonIndex === index);
      });
    }

    diagrams.forEach((diagram, index) => {
      const button = document.createElement("button");
      button.className = "tab-button";
      button.textContent = diagram.title;
      button.addEventListener("click", () => showDiagram(index));
      tabs.appendChild(button);
    });

    showDiagram(0);
  </script>
</body>
</html>
