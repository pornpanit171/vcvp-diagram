
<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VCVP Sequence Diagrams</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 24px;
      font-family: Arial, sans-serif;
      background: #f7f7f7;
      color: #111;
    }

    h1 {
      margin-top: 0;
      margin-bottom: 20px;
      font-size: 48px;
      font-weight: bold;
    }

    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 20px;
    }

    .tab-button {
      padding: 10px 16px;
      border: 1px solid #ccc;
      border-radius: 8px;
      background: #fff;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s ease;
    }

    .tab-button:hover {
      background: #f0f0f0;
    }

    .tab-button.active {
      background: #111;
      color: #fff;
      border-color: #111;
    }

    .diagram-container {
      width: 100%;
      height: calc(100vh - 180px);
      overflow: auto;
      background: white;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 20px;
    }

    #diagramImage {
      display: block;
      width: auto;
      height: auto;
      max-width: none;
    }
  </style>
</head>

<body>

  <h1>VC Sequence Diagrams</h1>

  <div class="tabs" id="tabs"></div>

  <div class="diagram-container">
    <img id="diagramImage" alt="Sequence Diagram">
  </div>

  <script>

    const diagrams = [
      {
        title: "VC Issuance",
        svg: "./docs/vc-issuance-sequence.svg"
      },
	  {
        title: "VP Issuance",
        svg: "./docs/vp-issuance-sequence.svg"
      },
	  {
        title: "Revoke/Suspend/Reactivate",
        svg: "./docs/Revoke-Suspend-Reactivate-sequence.svg"
      },
	  {
        title: "Status List publication",
        svg: "./docs/Sequence-Lifecycle-Status-List.svg"
      }
    ];

    const tabs = document.getElementById("tabs");
    const diagramImage = document.getElementById("diagramImage");

    function showDiagram(index) {

      diagramImage.src = diagrams[index].svg;
      diagramImage.alt = diagrams[index].title;

      document.querySelectorAll(".tab-button").forEach((button, buttonIndex) => {
        button.classList.toggle("active", buttonIndex === index);
      });
    }

    diagrams.forEach((diagram, index) => {

      const button = document.createElement("button");

      button.className = "tab-button";
      button.textContent = diagram.title;

      button.addEventListener("click", () => {
        showDiagram(index);
      });

      tabs.appendChild(button);
    });

    showDiagram(0);

  </script>

</body>
</html>
