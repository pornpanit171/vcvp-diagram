name: Render PlantUML

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Render PUML to SVG
        uses: plantuml/plantuml-action@v1
        with:
          args: -tsvg docs/vc-issuance-sequence.puml

      - name: Commit SVG
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Render PlantUML SVG
          file_pattern: docs/*.svg