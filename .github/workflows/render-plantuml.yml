name: Render PlantUML and deploy Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PlantUML
        run: |
          sudo apt-get update
          sudo apt-get install -y plantuml graphviz

      - name: Render PUML to SVG
        run: |
          plantuml -tsvg docs/vc-issuance-sequence.puml

      - name: List generated files
        run: |
          find docs -name "*.svg"